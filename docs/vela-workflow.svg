<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="760" rx="36" fill="#120B12"/>
  <rect x="50" y="50" width="1180" height="660" rx="28" fill="#171118" stroke="#4A2436"/>

  <text x="86" y="116" fill="#F4D4E2" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="800">Customer workflow</text>
  <text x="86" y="154" fill="#BCA6B0" font-size="22" font-family="Inter, Arial, sans-serif">From content generation to lead follow-up and posting preparation.</text>

  <rect x="84" y="250" width="254" height="254" rx="26" fill="#1C151D" stroke="#5A2D42"/>
  <rect x="372" y="250" width="254" height="254" rx="26" fill="#1C151D" stroke="#5A2D42"/>
  <rect x="660" y="250" width="254" height="254" rx="26" fill="#1C151D" stroke="#5A2D42"/>
  <rect x="948" y="250" width="254" height="254" rx="26" fill="#1C151D" stroke="#5A2D42"/>

  <circle cx="146" cy="298" r="24" fill="#D86C92"/><text x="138" y="306" fill="#FFFFFF" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="800">1</text>
  <text x="118" y="352" fill="#FFFFFF" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="800">Create content</text>
  <text x="118" y="390" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">Choose channel, goal, audience,</text>
  <text x="118" y="417" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">service, and tone of voice.</text>
  <rect x="118" y="452" width="126" height="32" rx="16" fill="#2A1A26"/>
  <text x="142" y="473" fill="#EEDDE5" font-size="16" font-family="Inter, Arial, sans-serif">AI-assisted</text>

  <circle cx="434" cy="298" r="24" fill="#D86C92"/><text x="426" y="306" fill="#FFFFFF" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="800">2</text>
  <text x="406" y="352" fill="#FFFFFF" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="800">Save and reuse</text>
  <text x="406" y="390" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">Store generated drafts in content</text>
  <text x="406" y="417" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">history for quick follow-up use.</text>
  <rect x="406" y="452" width="142" height="32" rx="16" fill="#2A1A26"/>
  <text x="431" y="473" fill="#EEDDE5" font-size="16" font-family="Inter, Arial, sans-serif">History-aware</text>

  <circle cx="722" cy="298" r="24" fill="#D86C92"/><text x="714" y="306" fill="#FFFFFF" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="800">3</text>
  <text x="694" y="352" fill="#FFFFFF" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="800">Manage leads</text>
  <text x="694" y="390" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">Update status, add notes, and track</text>
  <text x="694" y="417" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">who needs attention next.</text>
  <rect x="694" y="452" width="120" height="32" rx="16" fill="#2A1A26"/>
  <text x="722" y="473" fill="#EEDDE5" font-size="16" font-family="Inter, Arial, sans-serif">CRM-lite</text>

  <circle cx="1010" cy="298" r="24" fill="#D86C92"/><text x="1002" y="306" fill="#FFFFFF" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="800">4</text>
  <text x="982" y="352" fill="#FFFFFF" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="800">Prepare posting</text>
  <text x="982" y="390" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">Upload media, pick platform,</text>
  <text x="982" y="417" fill="#D2BDC7" font-size="18" font-family="Inter, Arial, sans-serif">schedule, and confirm safely.</text>
  <rect x="982" y="452" width="148" height="32" rx="16" fill="#2A1A26"/>
  <text x="1018" y="473" fill="#EEDDE5" font-size="16" font-family="Inter, Arial, sans-serif">Guided posting</text>

  <path d="M338 378H372" stroke="#6F4252" stroke-width="6" stroke-linecap="round"/>
  <path d="M626 378H660" stroke="#6F4252" stroke-width="6" stroke-linecap="round"/>
  <path d="M914 378H948" stroke="#6F4252" stroke-width="6" stroke-linecap="round"/>

  <rect x="84" y="562" width="1118" height="102" rx="22" fill="#1C151D" stroke="#5A2D42"/>
  <text x="118" y="612" fill="#FFFFFF" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">
    Result: a calmer daily workflow that turns scattered spa marketing tasks into one guided operating system.
  </text>
